# Render Blueprint for CLMS — single web service (serves UI + API) + database.
# In the Render dashboard: New + → Blueprint → pick this repo/branch → Apply.
databases:
  - name: clms-db
    plan: free
    databaseName: clms
    user: clms

services:
  - type: web
    name: clms
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clms-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
